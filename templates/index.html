<h2>Recent Failures</h2>

{% for failure in failures %}

<div style="border:1px solid gray;padding:15px;margin:15px;border-radius:10px;">

<h3>{{ failure.repo }}</h3>

<p><b>Workflow:</b> {{ failure.workflow }}</p>

<p><b>Status:</b> {{ failure.status }}</p>

<p><b>Time:</b> {{ failure.time }}</p>

<p><b>Error:</b></p>



<pre>{{ failure.error }}</pre>


<h4>🤖 AI Analysis</h4>

<p><b>Cause:</b> {{ failure.ai.cause }}</p>

<p><b>Solution:</b> {{ failure.ai.solution }}</p>
</div>

{% endfor %}
