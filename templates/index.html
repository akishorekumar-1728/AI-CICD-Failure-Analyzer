<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CI/CD Failure Analyzer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:30px;
}

.dashboard{
    display:flex;
    justify-content:space-around;
    margin-bottom:40px;
}

.card{
    width:250px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.card h2{
    margin-bottom:10px;
    color:#22c55e;
}

.card p{
    font-size:30px;
    font-weight:bold;
}

.failure-card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.failure-card h2{
    color:#ef4444;
    margin-bottom:20px;
}

.info{
    margin:10px 0;
}

.error{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    color:#fca5a5;
}

.ai{
    background:#064e3b;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    color:#bbf7d0;
}

</style>

</head>

<body>

<h1>🤖 AI CI/CD Failure Analyzer</h1>

<div class="dashboard">

<div class="card">
<h2>Total Builds</h2>
<p>12</p>
</div>

<div class="card">
<h2>Successful</h2>
<p>9</p>
</div>

<div class="card">
<h2>Failed</h2>
<p>3</p>
</div>

</div>

<div class="failure-card">

<h2>Recent Build Failure</h2>

<div class="info"><b>Repository:</b> AI-CICD-Failure-Analyzer</div>

<div class="info"><b>Workflow:</b> Python CI</div>

<div class="info"><b>Status:</b> ❌ Failed</div>

<div class="info"><b>Time:</b> 29-Jun-2026 10:30 AM</div>

<div class="error">

<b>Error Log</b>

<br><br>

ModuleNotFoundError:
No module named 'requests'

</div>

<div class="ai">

<b>AI Analysis</b>

<br><br>

Waiting for AI analysis...

</div>

</div>

</body>
</html>
